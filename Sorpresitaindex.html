<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Mi Dulce Deborah</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at center, #0d001a, #000);
  color: white;
  text-align: center;
}/* Lunas */ body::before { content: "🌙 🌕 🌖 🌗 🌘 🌑 🌒 🌓 🌔"; position: absolute; width: 200%; height: 200%; font-size: 40px; opacity: 0.08; animation: mover 80s linear infinite; }

@keyframes mover { from {transform: translate(0,0);} to {transform: translate(-50%, -50%);} }

/* Corazones */ .corazon { position: absolute; color: #ff4da6; font-size: 20px; animation: subir 6s linear infinite; }

@keyframes subir { 0% {transform: translateY(100vh); opacity: 0;} 50% {opacity: 1;} 100% {transform: translateY(-10vh); opacity: 0;} }

/* Fotos */ .foto { position: absolute; width: 120px; border-radius: 20px; animation: flotar 10s infinite ease-in-out; }

@keyframes flotar { 0%,100% {transform: translateY(0);} 50% {transform: translateY(-20px);} }

#inicio { position: absolute; width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #ff4da6, #8000ff); }

button { padding: 20px 40px; font-size: 20px; border: none; border-radius: 30px; background: #ff66b2; color: white; }

#contenido { display: none; position: absolute; width: 100%; height: 100vh; }

.mensaje { position: absolute; width: 100%; top: 40%; font-size: 28px; animation: fade 4s infinite; }

@keyframes fade { 0% {opacity: 0;} 50% {opacity: 1;} 100% {opacity: 0;} }

h1 { position: absolute; top: 15%; width: 100%; font-size: 32px; color: #ff99cc; }

</style>
</head>
<body><div id="inicio">
  <button onclick="iniciar()">Hola amorrrrr 👀<br>Presiona aquí 💖</button>
</div><div id="contenido">
  <h1>Para Mi Dulce Deborah ♥️✨</h1>
  <div class="mensaje" id="texto"></div>  <!-- FOTOS (IMPORTANTE: poner las imágenes en la misma carpeta con estos nombres) -->  <img src="foto1.jpg" class="foto" style="top:20%; left:10%;">
  <img src="foto2.jpg" class="foto" style="top:60%; left:70%;">
  <img src="foto3.jpg" class="foto" style="top:30%; left:50%;">
</div><!-- YouTube Música --><iframe id="musica" width="0" height="0" src="https://www.youtube.com/embed/yKNxeF4KMsY?autoplay=1&loop=1&playlist=yKNxeF4KMsY" frameborder="0" allow="autoplay"></iframe><script>
const mensajes = [
  "Esto es una sorpresa 👀👀",
  "Estás ansiosa? Ya casi... 👀",
  "Un poquito más... 😏",
  "Presiona acá y mira esto amor 👀♥️",
  "Ti Amooooo ♥️✨",
  "Pelirrojienta hermosa 😻",
  "Te extraño 😒🥺",
  "Sos mi luna favorita 🌙",
  "Iluminás mis días y mis noches ✨",
  "Te elegiría mil veces ❤️",
  "Mi dulce Deborah… te amo muchísimo 💕"
];

let i = 0;

function iniciar() {
  document.getElementById('inicio').style.display = 'none';
  document.getElementById('contenido').style.display = 'block';
  crearCorazones();
  mostrarMensajes();
}

function mostrarMensajes() {
  const texto = document.getElementById('texto');
  texto.innerText = mensajes[i];
  i = (i + 1) % mensajes.length;
  setTimeout(mostrarMensajes, 3500);
}

function crearCorazones() {
  setInterval(() => {
    const corazon = document.createElement('div');
    corazon.classList.add('corazon');
    corazon.style.left = Math.random() * 100 + 'vw';
    corazon.innerText = '💖';
    document.body.appendChild(corazon);

    setTimeout(() => corazon.remove(), 6000);
  }, 300);
}
</script></body>
</html>
